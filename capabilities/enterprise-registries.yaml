naftiko: 1.0.0-alpha2
info:
  label: Anchore Enterprise API — Registries
  description: 'Anchore Enterprise API — Registries. 1 operations. Lead operation: Anchore Enterprise List Registries. Self-contained
    Naftiko capability covering one Anchore business surface.'
  tags:
  - Anchore
  - Registries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ANCHORE_API_KEY: ANCHORE_API_KEY
capability:
  consumes:
  - type: http
    namespace: enterprise-registries
    baseUri: https://anchore.example.com/v2
    description: Anchore Enterprise API — Registries business capability. Self-contained, no shared references.
    resources:
    - name: registries
      path: /registries
      operations:
      - name: listregistries
        method: GET
        description: Anchore Enterprise List Registries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ANCHORE_API_KEY}}'
  exposes:
  - type: rest
    namespace: enterprise-registries-rest
    port: 8080
    description: REST adapter for Anchore Enterprise API — Registries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/registries
      name: registries
      description: REST surface for registries.
      operations:
      - method: GET
        name: listregistries
        description: Anchore Enterprise List Registries
        call: enterprise-registries.listregistries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: enterprise-registries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Anchore Enterprise API — Registries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: anchore-enterprise-list-registries
      description: Anchore Enterprise List Registries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: enterprise-registries.listregistries
      outputParameters:
      - type: object
        mapping: $.
